name: "DripDrop"
version: "1.0.1"
slug: "dripdrop"
description: "Home Assistant integration for the DripDrop ESP32 irrigation controller"
arch: [aarch64, amd64, armhf, armv7]
startup: application
boot: auto
map: []
options:
  esp32_host: "dripdrop.local"
  esp32_port: 80
  poll_interval: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  valve_count: 4
schema:
  esp32_host: str
  esp32_port: int
  poll_interval: int(5,3600)
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  valve_count: int(1,8)
